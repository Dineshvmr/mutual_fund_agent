openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Mutual Fund Analysis Agent API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: analysis
    description: Mutual fund analysis operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /analysis/recommend:
    post:
      operationId: getRecommendations
      tags: [analysis]
      summary: Get mutual fund recommendations
      description: Analyze user investment profile and return tailored mutual fund recommendations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvestmentProfile"
      responses:
        "200":
          description: Recommendations generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    InvestmentProfile:
      type: object
      properties:
        timeHorizon:
          type: string
          enum: [short, medium, long]
          description: "short = <3 years, medium = 3-7 years, long = >7 years"
        goal:
          type: string
          description: Investment purpose/goal (e.g. retirement, child education, wealth creation, emergency fund)
        tenure:
          type: number
          description: Specific tenure in years
        investingNature:
          type: string
          enum: [sip, one-time]
          description: SIP (Systematic Investment Plan) or one-time lump sum
        monthlyAmount:
          type: number
          description: Monthly SIP amount in INR (required if investingNature is sip)
        lumpSumAmount:
          type: number
          description: Lump sum amount in INR (required if investingNature is one-time)
        riskTolerance:
          type: string
          enum: [low, moderate, high]
          description: User's risk tolerance level
      required:
        - timeHorizon
        - goal
        - tenure
        - investingNature
        - riskTolerance
    NavDataPoint:
      type: object
      properties:
        date:
          type: string
          description: Date in YYYY-MM-DD format
        nav:
          type: number
          description: NAV value on this date
      required:
        - date
        - nav
    FundPerformance:
      type: object
      properties:
        oneYear:
          type: number
          description: 1-year return percentage
        threeYear:
          type: number
          description: 3-year CAGR percentage
        fiveYear:
          type: number
          description: 5-year CAGR percentage
        sinceInception:
          type: number
          description: Since inception CAGR percentage
        inceptionYear:
          type: number
          description: Year the fund was launched
      required:
        - oneYear
        - threeYear
        - fiveYear
        - sinceInception
        - inceptionYear
    FundCosts:
      type: object
      properties:
        expenseRatio:
          type: number
          description: Annual expense ratio percentage (Direct plan)
        exitLoad:
          type: string
          description: Exit load details (e.g. "1% if redeemed within 1 year")
        stampDuty:
          type: string
          description: Stamp duty applicable
        taxOnReturns:
          type: string
          description: Tax applicable on returns (LTCG / STCG / Debt taxation)
      required:
        - expenseRatio
        - exitLoad
        - stampDuty
        - taxOnReturns
    MutualFundRecommendation:
      type: object
      properties:
        name:
          type: string
          description: Fund name
        category:
          type: string
          description: Fund category (e.g. Large Cap, Mid Cap, ELSS, Debt, etc.)
        amcName:
          type: string
          description: Asset Management Company name
        riskLevel:
          type: string
          enum: [low, moderate, moderately-high, high, very-high]
        returnPotential:
          type: string
          description: Expected return range (e.g. 10-12% p.a.)
        whyRecommended:
          type: string
          description: Personalized explanation of why this fund suits the user
        keyHighlights:
          type: array
          items:
            type: string
          description: Key features of the fund
        sipMinAmount:
          type: number
          description: Minimum SIP amount in INR
        lumpSumMinAmount:
          type: number
          description: Minimum lump sum investment in INR
        taxBenefit:
          type: boolean
          description: Whether the fund offers tax benefits under 80C
        performance:
          $ref: "#/components/schemas/FundPerformance"
        costs:
          $ref: "#/components/schemas/FundCosts"
        schemeCode:
          type: number
          description: AMFI scheme code used to fetch NAV data (null if lookup failed)
          nullable: true
        navHistory:
          type: array
          description: Monthly-sampled historical NAV data from AMFI (oldest first)
          items:
            $ref: "#/components/schemas/NavDataPoint"
      required:
        - name
        - category
        - amcName
        - riskLevel
        - returnPotential
        - whyRecommended
        - keyHighlights
        - sipMinAmount
        - lumpSumMinAmount
        - taxBenefit
        - performance
        - costs
    RecommendationResult:
      type: object
      properties:
        summary:
          type: string
          description: Overall analysis summary for the user
        recommendations:
          type: array
          items:
            $ref: "#/components/schemas/MutualFundRecommendation"
        disclaimer:
          type: string
          description: Standard financial disclaimer
        projectedValue:
          type: string
          description: Estimated future value based on inputs
      required:
        - summary
        - recommendations
        - disclaimer
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message
